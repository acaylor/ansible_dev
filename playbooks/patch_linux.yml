---
# Consolidated OS patching playbook.
# Supports the RedHat family (RHEL / Rocky / AlmaLinux / CentOS Stream 8, 9, 10),
# the Debian family (Debian / Ubuntu) and the SUSE family (openSUSE Leap /
# Tumbleweed / SLES). Upgrades all packages and reboots only when the host
# reports a reboot is required.
- name: Patch Linux hosts
  hosts: all
  become: true

  pre_tasks:
    - name: Fail on unsupported OS family
      ansible.builtin.fail:
        msg: "{{ inventory_hostname }} ({{ ansible_facts['os_family'] }}) is not supported by this playbook"
      when: ansible_facts['os_family'] not in ["RedHat", "Debian", "Suse"]

    - name: Ensure dnf-utils is present (needs-restarting) - RedHat family
      ansible.builtin.dnf:
        name: dnf-utils
        state: present
      when: ansible_facts['os_family'] == "RedHat"

  tasks:
    - name: Upgrade all packages - Debian family
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Upgrade all packages - RedHat family
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_facts['os_family'] == "RedHat"

    - name: Distribution upgrade (zypper dup) - openSUSE Tumbleweed
      community.general.zypper:
        name: "*"
        state: dist-upgrade
        update_cache: true
      when: ansible_facts['distribution'] == "openSUSE Tumbleweed"

    - name: Upgrade all packages - SUSE family (Leap / SLES)
      community.general.zypper:
        name: "*"
        state: latest
        update_cache: true
      when:
        - ansible_facts['os_family'] == "Suse"
        - ansible_facts['distribution'] != "openSUSE Tumbleweed"

    - name: Check if a reboot is required - RedHat family
      ansible.builtin.command: needs-restarting -r
      register: needs_restarting
      failed_when: false
      changed_when: needs_restarting.rc == 1
      notify: Reboot host
      when: ansible_facts['os_family'] == "RedHat"

    - name: Check if a reboot is required - SUSE family
      ansible.builtin.command: zypper needs-rebooting
      register: zypper_needs_rebooting
      failed_when: zypper_needs_rebooting.rc not in [0, 102]
      changed_when: zypper_needs_rebooting.rc == 102
      notify: Reboot host
      when: ansible_facts['os_family'] == "Suse"

    - name: Check if a reboot is required - Debian family
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_facts['os_family'] == "Debian"

    - name: Trigger reboot - Debian family
      ansible.builtin.debug:
        msg: Reboot required
      changed_when: true
      notify: Reboot host
      when:
        - ansible_facts['os_family'] == "Debian"
        - reboot_required.stat.exists | default(false)

  handlers:
    - name: Reboot host
      ansible.builtin.reboot:
